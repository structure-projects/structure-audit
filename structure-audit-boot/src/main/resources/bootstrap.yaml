server:
  port: 8080
spring:
  profiles:
    active: dev
  application:
    name: audit-center
  cloud:
    nacos:
      server-addr: ${NACOS_SERVER:nacos.structured.cn:8848}
      discovery:
        namespace: ${NACOS_NAMESPACE:5a4e4c1f-beda-4ae5-a3d7-428950e7473b}
        metadata:
          version: @project.version@
        group: ${NACOC_GROUP:${spring.profiles.active}}
        enabled: ${NACOS_DISCOVERY_ENABLE:false}
        username: ${NACOS_USERNAME:structure}
        password: ${NACOS_PASSWORD:structure}
      config:
        server-addr: ${NACOS_SERVER:nacos.structured.cn:8848}
        namespace: ${NACOS_NAMESPACE:5a4e4c1f-beda-4ae5-a3d7-428950e7473b}
        group: ${NACOC_GROUP:${spring.profiles.active}}
        name: ${spring.application.name}
        file-extension: yaml
        enabled: ${NACOS_CONFIG_ENABLE:false}
      username: ${NACOS_USERNAME:structure}
      password: ${NACOS_PASSWORD:structure}
management:
  endpoint:
    health:
      show-details: always
      mail:
        enabled: false  # 禁用默认的邮件健康检查，因为我们使用插件化的邮件发送
  server:
    port: 7777
structure:
  log:
    aop:
      expression: execution(public * com.structure.audit.biz.controller..*Controller.*(..))
      enable: true
---
spring:
  config:
    activate:
      on-profile: dev
server:
  port: 18001
---
spring:
  config:
    activate:
      on-profile: pro

