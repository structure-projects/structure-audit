server:
  port: 8081

spring:
  application:
    name: audit-client-example

  datasource:
    type: com.zaxxer.hikari.HikariDataSource
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://172.24.20.15:3306/audit?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=GMT%2B8
    username: root
    password: 123456
    hikari:
      minimum-idle: 5
      maximum-pool-size: 15
      auto-commit: true
      idle-timeout: 30000
      pool-name: MessageCenterHikariCP
      max-lifetime: 1800000
      connection-timeout: 30000
      connection-test-query: SELECT 1
  # RabbitMQ配置 - 用于发送MQ消息到审计系统
  rabbitmq:
    host: 172.24.20.15
    port: 5672
    username: root
    password: 123456
    virtual-host: /
    publisher-confirm-type: correlated
    publisher-returns: true

# 审计服务配置
audit:
  server:
    url: http://127.0.0.1:18001

# 日志配置
logging:
  level:
    cn.structured.example.audit: DEBUG
